name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Clean deprecated npm config
        run: |
          npm config delete always-auth --location=user 2>/dev/null || true
          npm config delete always-auth --location=project 2>/dev/null || true
          rm -f .npmrc

      - name: Ensure npm has OIDC trusted publishing support
        run: npm install -g npm@latest

      - name: Show toolchain
        run: |
          node --version
          npm --version

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build -w @idevconn/entitlements

      - name: Run semantic-release (version + changelog + tag, no publish)
        run: npx semantic-release
        working-directory: packages/entitlements
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if version is already on npm
        id: check
        working-directory: packages/entitlements
        run: |
          NAME=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          echo "Resolved $NAME@$VER"
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "Version already published. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm with provenance (OIDC)
        if: steps.check.outputs.skip == 'false'
        working-directory: packages/entitlements
        run: npm publish --provenance --access public
