name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: write
  id-token: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
      - run: npm run typecheck
      - run: npm run test
  release:
    name: 'Release'
    needs: [ci]
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      needs.ci.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release_management.outputs.tag }}
      bump_type: ${{ steps.release_management.outputs.bump_type }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
      - name: Bump version + tag
        id: release_management
        uses: ./.github/actions/bump
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_management.outputs.tag }}
          name: ${{ steps.release_management.outputs.tag }}
          body: ${{ steps.release_management.outputs.release_body }}
          generate_release_notes: false
          token: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Clean deprecated npm config
        run: |
          npm config delete always-auth --location=user 2>/dev/null || true
          npm config delete always-auth --location=project 2>/dev/null || true
          rm -f .npmrc

      - name: Ensure npm has OIDC trusted publishing support
        run: npm install -g npm@latest

      - name: Install dependencies and build entitlements package
        run: |
          npm ci
          npm run build -w @idevconn/isubscribe-entitlements

      - name: Check if version is already on npm
        id: check
        working-directory: packages/entitlements
        run: |
          NAME=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          echo "Resolved $NAME@$VER"
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "Version already published. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm with provenance
        if: steps.check.outputs.skip == 'false'
        working-directory: packages/entitlements
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "No NPM_TOKEN secret found. Publishing tokenlessly via OIDC Trusted Publishing..."
            npm publish --provenance --access public
          else
            echo "NPM_TOKEN secret found. Publishing via token..."
            NODE_AUTH_TOKEN="${{ secrets.NPM_TOKEN }}" npm publish --provenance --access public
          fi
