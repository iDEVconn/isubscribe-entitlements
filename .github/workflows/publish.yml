name: Publish to npm

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: 'Build & Publish @idevconn/isubscribe-entitlements'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest
      - run: npm ci
      - name: Build
        run: npm run build -w @idevconn/isubscribe-entitlements
      - name: Check if version already published
        working-directory: packages/entitlements
        run: |
          NAME=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "Version $VER already published. Skipping."
            echo "SKIP_PUBLISH=true" >> $GITHUB_ENV
          else
            echo "SKIP_PUBLISH=false" >> $GITHUB_ENV
          fi
      - name: Publish
        if: env.SKIP_PUBLISH == 'false'
        working-directory: packages/entitlements
        run: npm publish --access public
